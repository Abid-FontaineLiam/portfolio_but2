name: Construction des pages VuePress

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Le checkout
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Construction du site VuePress
        run: npm run build

      - name: Chargement des artefacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vuepress/dist

      - name: Déploiement du site sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4