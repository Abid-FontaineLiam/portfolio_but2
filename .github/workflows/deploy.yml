# Source : https://vuepress.github.io/guide/deployment.html#github-pages
name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build VuePress site
        run: pnpm build

      - name: Create .nojekyll
        run: touch build/.nojekyll

      - name: Chargement des artefacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Déploiement du site sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4